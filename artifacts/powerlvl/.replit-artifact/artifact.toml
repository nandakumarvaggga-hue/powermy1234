kind = "web"
previewPath = "/"
title = "POWERLVL"
version = "1.0.0"
id = "artifacts/powerlvl"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24246

[services.development]
run = "pnpm --filter @workspace/powerlvl run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/powerlvl", "run", "build" ]
publicDir = "artifacts/powerlvl/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24246"
BASE_PATH = "/"
